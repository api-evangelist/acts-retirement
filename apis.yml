name: Acts Retirement-Life Communities
description: >-
  Acts Retirement-Life Communities is a not-for-profit operator of continuing
  care retirement communities (CCRCs) headquartered in West Point, Pennsylvania.
  Founded in 1972, Acts operates 28 senior living campuses across nine
  Mid-Atlantic and Southeastern U.S. states (Alabama, Delaware, Florida,
  Georgia, Maryland, New Jersey, North Carolina, Pennsylvania, South Carolina)
  and serves approximately 10,000 residents. Its core service lines are
  independent living for adults 55+, assisted living, memory care, skilled
  nursing, short-term rehabilitation, and on-campus health services delivered
  under the Acts Life Care contract model. Acts publishes no public developer
  APIs, no OpenAPI specifications, no SDKs, and no developer portal — its
  digital surface consists of a marketing website, a community directory, an
  iCIMS-hosted careers portal at careers-actslife.icims.com, and a separate
  health-services marketing site at actshealthservices.org. This repository
  documents the organization and its likely senior-living IT vendor stack for
  ecosystem mapping purposes; it does not document a developer API surface
  because none is published.
